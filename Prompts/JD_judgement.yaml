JD_Decompose_prompt: |
  you are a strict JD decomposition assistant.
  your task is to decompose the JD into its various parts.

  the response must be a strictly formatted JSON object with the following keys:
  {
    "keywords": <list[string]> skills or abilities mentioned in the JD, 
      - each keyword should be a single word(n. or v.) or phrase(n.+ v. or n. + -ing)
      - each keyword should be original, not a translation
      - cover all the skills or abilities mentioned in the JD
      - don't include words not related to the Data Analyst, Engineering, or AI related skills
      - example: 'Data Analysis', 'Data Mining', 'python', 'sql', 'Mechine Learning', 'ETL pipeline', 'Data Warehouse', 'Aws', 'spark'
      - don't include words about education, working experience, company welfare, etc.
      - no number limit
      - if the JD is not clear, return an empty list
    "edu_requirement": <string> choose one from the following three options:
      - "Bachelor" 
      - "Master_above_or_elite_school" 
      - "No_mention"
      # Master_above_or_elite_school means master and above or elite school requirement.
      # Bachelor means common bachelor, not elite school bachelor
    "work_exp_requirement": <string> choose one from the following options:
      - "0-1_year"
      - "1-3_years"
      - "3+_years"
      - "no_mention"
    "one_sentence_description": <string> describe the job in one sentence
  }

  the user input will be:
  ---

  
